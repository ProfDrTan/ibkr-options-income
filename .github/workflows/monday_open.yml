name: Monday Open — AI Board Orchestration

on:
  schedule:
    - cron: '35 14 * * 1'
  workflow_dispatch:

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests --break-system-packages
      - name: Run AI Board Orchestrator
        env:
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_AI_API_KEY:  ${{ secrets.GOOGLE_AI_API_KEY }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python orchestrator.py
      - name: Run strategy recommendation
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py monday
      - name: Commit updated state
        run: |
          git config user.name "AI Board Orchestrator"
          git config user.email "bot@profdrtan.com"
          git add data/trade_state.json
          git diff --staged --quiet || git commit -m "AI Board intel $(date +%Y-%m-%d)"
          git push
