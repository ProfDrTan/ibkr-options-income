name: Daily Check - Monitor Positions

on:
  schedule:
    - cron: '45 20 * * 1-5'  # 15:45 ET (20:45 UTC) Mon-Fri
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily position check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py check

      - name: Commit state update
        run: |
          git config user.name "IBKR Options Bot"
          git config user.email "bot@profdrtan.com"
          git add data/trade_state.json
          git diff --staged --quiet || git commit -m "Position check $(date +%Y-%m-%d %H:%M)"
          git push
